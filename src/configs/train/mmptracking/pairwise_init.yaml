MODELS:
  PAIRWISE:
    BACKBONE: r50

    FREEZE_DETR: False
    RESET_TGT: True
    RESET_UNUSED: 1 
    WEIGHTED_VIEWS: False

    # NOTE: changed for ablation
    PRED_TRACK_BOXES_TIME: False # True    # predict BB for frame before and after from track emedding

    PAIRWISE_LOSS: True # in you don't have track labels
    EMBEDDING_LOSS: False

    PRED_TOPDOWN: True
    
    #unchanged
    FREEZE_DETR_BACKBONE: False
    NUM_CLASSES: 1
    NUM_QUERIES: 20
    PW_QUERIES: 20
    PW_LAYERS: 1
    PW_PASSTHROUGH_SRC: True
    PW_PROJ_DIM_SCALE: 1
    PW_NO_PROJ: False
    DETACHED_UNTIL: 0
    # NOTE: changed for ablation
    PRED_TRACK_BOXES: False # True
    ADD_BBOXES: True
    SCALED_COSTS: True
    TGT_AS_POS: False
    ZERO_QE: True
    SELF_ATTENTION_BEFORE: False
    SELF_ATTENTION_AFTER: True
    RESET_TGT_UNTIL: 0
    CLIP_LENGTH_PROGRESSION: 'linear'
    CONTEXT_SIZE: 1
    CHECKPOINT: 'D:/download/-/src/checkpoints/detr-r50-e632da11.pth'


TRAINING:
  # metrics
  PRINT_FREQ: 100
  SAVE_EVERY: 10 #Save the model every x epochs

  # model
  AMP: False
  CUDNN_BENCHMARK: True
  FIND_UNUSED_PARAM: False
  MODEL: PAIRWISE
  COMMENT: 'R50'

  # data
  PIN_MEMORY: False
  BATCH_SIZE: 32
  LOADER_NUM_WORKERS: 0

  # misc
  START_EPOCH: 0
  MAX_GRAD_NORM: 1.0
  MAX_NUM_EPOCHS: 30
  ITS_PER_EPOCH: 600
  
  # optimizer
  OPTIMIZER: adamw # [adam, sgd, adamw]
  LR: 1e-4
  LR_DETR_MULT: 1
  WEIGHT_DECAY: 0. # 0.05 # 0.01, 1e-4
  ADAM_EPS: 1e-8 # 1e-6
  # SGD
  MOMENTUM: 0.9
  NESTEROV: True
  
  # # scheduler (default: ReduceLROnPlateau)
  # SCHEDULER: cosine # linear | cosine | step
  # LR_DECAY_RATIO: 0.3 # 0.3
  # PATIENCE: 0
  # LR_DROP: 1 # step 
  # WARMUP_MULTIPLIER: 10 # cosine

  # scheduler (default: ReduceLROnPlateau)
  SCHEDULER: step # linear | cosine | step
  LR_DECAY_RATIO: 0.3 # 0.3
  PATIENCE: 0
  STEP_SIZE: 20 # step 
  WARMUP_MULTIPLIER: 2 # cosine
